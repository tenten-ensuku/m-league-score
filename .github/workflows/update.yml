name: Mリーグ データ自動更新

on:
  schedule:
    - cron: '0 17 * * 1,2,4,5'  # 月火木金 26:00 JST = 火水金土 2:00 JST (UTC 17:00)
  workflow_dispatch:              # GitHub画面からの手動実行も可能

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: スクレイプ実行
        run: node scrape.js

      - name: 変更をコミット & プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js history.js
          git diff --staged --quiet || git commit -m "データ更新: $(TZ='Asia/Tokyo' date '+%Y/%m/%d')"
          git push

      - name: Netlify にデプロイ
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          npm install -g netlify-cli
          netlify deploy --prod --dir=.
