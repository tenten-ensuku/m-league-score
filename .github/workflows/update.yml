name: Mリーグ データ自動更新

on:
  schedule:
    - cron: '0 23 * * *'   # 毎日 08:00 JST（UTC 23:00）
  workflow_dispatch:         # GitHub画面からの手動実行も可能

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: スクレイプ実行
        run: node scrape.js

      - name: 変更をコミット & プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js history.js
          git diff --staged --quiet || git commit -m "データ更新: $(TZ='Asia/Tokyo' date '+%Y/%m/%d')"
          git push
